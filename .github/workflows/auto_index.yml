name: Auto Update Coding Vault Index

on:
  push:
    branches:
      - main  # Agar aapki branch ka naam master hai to yahan master likhein

permissions:
  contents: write # GitHub action ko file modify karne ki permission dena

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Index Generator
      run: python generate_index.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add data.js
        git diff-index --quiet HEAD || git commit -m "🤖 Auto-updated data.js via GitHub Actions"
        git push
