<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Ultimate Coding Vault</title>
    <script src="https://jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://cloudflare.com"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        /* Custom sleek scrollbar for ultra professional layout */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans flex flex-col select-none antialiased">

    <header class="border-b border-slate-900 bg-slate-950/70 backdrop-blur px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="h-8 w-8 rounded-lg bg-gradient-to-br from-sky-500 to-indigo-600 flex items-center justify-center font-bold text-sm shadow-indigo-500/20 shadow-lg">⚡</div>
            <h1 class="text-base font-black tracking-tight bg-gradient-to-r from-slate-100 via-sky-400 to-indigo-400 bg-clip-text text-transparent">MY ULTIMATE CODING VAULT</h1>
        </div>
        <div class="text-xs font-mono text-slate-400 bg-slate-900 px-3 py-1.5 rounded-full border border-slate-800/80 shadow-inner">
            Total Solved: <span id="displayed-count" class="text-sky-400 font-bold">0</span> / <span id="total-count" class="text-slate-500">0</span>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <aside class="w-80 border-r border-slate-900 bg-slate-950/40 p-4 flex flex-col gap-5 overflow-y-auto shrink-0">
            <div class="flex flex-col gap-1.5">
                <label for="search" class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Search Matrix</label>
                <div class="relative">
                    <input type="text" id="search" placeholder="Search ID or challenge title..." class="w-full bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500/30 transition placeholder:text-slate-600 font-medium">
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Range Scope Index</label>
                <div class="flex items-center gap-2">
                    <input type="number" id="range-from" placeholder="Min ID" class="w-full bg-slate-900 border border-slate-800 rounded-lg px-2 py-1.5 text-xs text-center focus:outline-none focus:border-sky-500 transition font-mono">
                    <span class="text-slate-600 text-xs">-</span>
                    <input type="number" id="range-to" placeholder="Max ID" class="w-full bg-slate-900 border border-slate-800 rounded-lg px-2 py-1.5 text-xs text-center focus:outline-none focus:border-sky-500 transition font-mono">
                </div>
                <div class="flex gap-2 mt-1">
                    <button id="apply-range" class="flex-1 bg-sky-600 hover:bg-sky-500 text-white font-semibold text-[10px] uppercase tracking-wider py-1.5 px-3 rounded-md transition-all shadow-md shadow-sky-600/10 active:scale-95 cursor-pointer">Apply Range</button>
                    <button id="reset-range" class="flex-1 bg-slate-900 hover:bg-slate-800/80 border border-slate-800 text-slate-400 font-semibold text-[10px] uppercase tracking-wider py-1.5 px-3 rounded-md transition active:scale-95 cursor-pointer">Reset</button>
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Filter Topics</label>
                <div id="topic-group" class="flex flex-wrap gap-1.5 max-h-32 overflow-y-auto pr-1"></div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Difficulty Core</label>
                <div id="diff-group" class="flex flex-wrap gap-1.5"></div>
            </div>

            <div class="flex flex-col gap-1.5 flex-1 min-h-0">
                <label class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">Algorithms Deck</label>
                <div id="blank-state" class="hidden py-10 text-center text-xs text-slate-600 font-medium italic border border-dashed border-slate-900 rounded-xl bg-slate-900/10">No challenges matching parameters.</div>
                <div id="list-stream" class="flex flex-col gap-1.5 overflow-y-auto pr-1 flex-1"></div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-slate-950 overflow-hidden relative">
            <div id="selected-meta" class="p-6 border-b border-slate-900 bg-slate-900/5 min-h-[85px] flex items-center">
                <div class="text-slate-500 font-medium italic text-xs tracking-wide flex items-center gap-2">
                    <span class="animate-pulse h-1.5 w-1.5 rounded-full bg-slate-700"></span> Select a solution stream compiler node from the sidebar.
                </div>
            </div>

            <div class="flex border-b border-slate-900 bg-slate-950 px-4 gap-2">
                <button id="tab-sol" class="px-4 py-3 border-b-2 font-bold text-[10px] tracking-wider uppercase transition-all cursor-pointer">Code Solution</button>
                <button id="tab-notes" class="px-4 py-3 border-b-2 font-bold text-[10px] tracking-wider uppercase transition-all cursor-pointer">Analysis Notes</button>
            </div>

            <div class="flex-1 overflow-hidden p-6 bg-slate-950 flex flex-col">
                <div id="pane-sol" class="hidden flex flex-col h-full min-h-0">
                    <div class="flex items-center justify-between bg-slate-900 px-4 py-2.5 rounded-t-xl border-t border-x border-slate-800/80 shadow-md">
                        <span id="sol-filename" class="text-xs font-mono text-slate-400 select-text">solution.py</span>
                        <button id="copy-solution-btn" class="flex items-center gap-1.5 hover:bg-slate-800 text-slate-400 hover:text-slate-100 px-3 py-1 rounded-md transition-all active:scale-95 cursor-pointer border border-transparent hover:border-slate-700 bg-slate-950/40">
                            <span class="text-[10px] font-bold uppercase tracking-wider">Copy File</span>
                        </button>
                    </div>
                    <pre class="bg-slate-900/40 p-5 border border-slate-800/60 rounded-b-xl overflow-auto flex-1 font-mono text-sm leading-relaxed select-text shadow-inner"><code id="code-block" class="language-python"></code></pre>
                </div>

                <div id="pane-notes" class="hidden bg-slate-900/10 border border-slate-900 p-6 rounded-xl h-full overflow-y-auto select-text prose prose-invert max-w-none text-xs leading-relaxed text-slate-300">
                    <div id="markdown-block"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
